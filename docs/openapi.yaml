openapi: 3.0.3
info:
  title: Portfolio Manager API Contract
  version: 0.1.0
  description: |
    Jawny kontrakt API dla endpointów objętych etapem porządkowania integracji frontend ↔ backend.
servers:
  - url: /api
components:
  schemas:
    ApiSuccessEnvelope:
      type: object
      required: [payload]
      properties:
        payload: {}
    ApiErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [message]
          properties:
            message:
              type: string
            code:
              type: string
            details:
              type: object
              additionalProperties: true
    SymbolMapping:
      type: object
      required: [id, symbol_input, ticker, created_at]
      properties:
        id:
          type: integer
        symbol_input:
          type: string
        ticker:
          type: string
        currency:
          type: string
          nullable: true
          enum: [PLN, USD, EUR, GBP, null]
        created_at:
          type: string
          nullable: true
    SymbolMappingDeleteResult:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
        message:
          type: string
    XtbImportSuccess:
      type: object
      required: [success, message, missing_symbols]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        missing_symbols:
          type: array
          items:
            type: string
    XtbImportErrorDetails:
      type: object
      properties:
        missing_symbols:
          type: array
          items:
            type: string
    LoanMutationResult:
      type: object
      required: [message]
      properties:
        id:
          type: integer
        message:
          type: string
    LoanSchedule:
      type: object
      required: [loan, baseline, simulation, actual_metrics, simulated_metrics, overpayments_list]
      properties:
        loan:
          type: object
          additionalProperties: true
        baseline:
          type: object
          additionalProperties: true
        simulation:
          type: object
          additionalProperties: true
        actual_metrics:
          type: object
          additionalProperties: true
        simulated_metrics:
          type: object
          additionalProperties: true
        overpayments_list:
          type: array
          items:
            type: object
            additionalProperties: true
paths:
  /portfolio/{portfolio_id}/import/xtb:
    post:
      summary: Import XTB CSV into portfolio
      parameters:
        - in: path
          name: portfolio_id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Import completed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      payload:
                        $ref: '#/components/schemas/XtbImportSuccess'
        '400':
          description: Validation or mapping error
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiErrorEnvelope'
                  - type: object
                    properties:
                      error:
                        type: object
                        properties:
                          details:
                            $ref: '#/components/schemas/XtbImportErrorDetails'
  /symbol-map:
    get:
      summary: List symbol mappings
      responses:
        '200':
          description: Symbol mappings list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      payload:
                        type: array
                        items:
                          $ref: '#/components/schemas/SymbolMapping'
    post:
      summary: Create symbol mapping
      responses:
        '201':
          description: Created symbol mapping
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      payload:
                        $ref: '#/components/schemas/SymbolMapping'
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '409':
          description: Mapping already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /symbol-map/{mapping_id}:
    put:
      summary: Update symbol mapping
      parameters:
        - in: path
          name: mapping_id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Updated symbol mapping
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      payload:
                        $ref: '#/components/schemas/SymbolMapping'
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
        '404':
          description: Mapping not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
    delete:
      summary: Delete symbol mapping
      parameters:
        - in: path
          name: mapping_id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Mapping deleted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      payload:
                        $ref: '#/components/schemas/SymbolMappingDeleteResult'
        '404':
          description: Mapping not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /loans/:
    get:
      summary: List loans
      responses:
        '200':
          description: Loans list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccessEnvelope'
    post:
      summary: Create loan
      responses:
        '201':
          description: Loan created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      payload:
                        $ref: '#/components/schemas/LoanMutationResult'
        '400':
          description: Missing field
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
  /loans/{loan_id}/schedule:
    get:
      summary: Get loan schedule
      parameters:
        - in: path
          name: loan_id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Loan schedule
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccessEnvelope'
                  - type: object
                    properties:
                      payload:
                        $ref: '#/components/schemas/LoanSchedule'
        '404':
          description: Loan not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorEnvelope'
